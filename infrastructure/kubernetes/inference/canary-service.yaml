# canary-service.yaml — Dedicated ClusterIP service for canary pods
# MISSING from original project — added to support:
#   1. Ingress-based canary traffic (CI/CD path)
#   2. Shadow traffic from stable pods (Deployment Agent path)
#
# selector: track: canary → routes ONLY to inference-canary pods
# stable inference-service continues routing 100% to track: stable pods
apiVersion: v1
kind: Service
metadata:
  name: inference-canary-service
  namespace: automl-brain
  labels:
    app: churn-inference
    track: canary
spec:
  type: ClusterIP
  selector:
    app: churn-inference
    track: canary
  ports:
  - port: 80
    targetPort: 8000