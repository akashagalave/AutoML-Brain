apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-stable
  namespace: automl-brain
  labels:
    app: churn-inference
    track: stable
spec:
  replicas: 4
  selector:
    matchLabels:
      app: churn-inference
      track: stable
  template:
    metadata:
      labels:
        app: churn-inference
        track: stable
    spec:
      containers:
      - name: churn-inference
        image: 199964507152.dkr.ecr.us-east-1.amazonaws.com/automl-brain-inference:latest
        imagePullPolicy: Always
        env:
        - name: MODEL_STAGE
          value: "Production"
        # Shadow traffic: mirrors every /predict request to canary pod async.
        # Ensures canary has real production data for Prometheus P95 comparison
        # in the Deployment Agent evaluate_canary() function.
        # Set to "" on canary pods to prevent infinite request loops.
        - name: CANARY_SHADOW_URL
          value: "http://inference-canary-service.automl-brain.svc.cluster.local:80"
        - name: SHADOW_TIMEOUT_SECONDS
          value: "2.0"
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1500m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3